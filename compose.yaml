services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sonho-magico-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-6100}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sonho_magico}
      MYSQL_USER: ${MYSQL_USER:-sonho_magico}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_mysql_password}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PORT:-6100}:6100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6100/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    container_name: sonho-magico-mysql
    restart: unless-stopped
    command:
      - --mysqlx=0
      - --bind-address=0.0.0.0
      - --skip-name-resolve
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sonho_magico}
      MYSQL_USER: ${MYSQL_USER:-sonho_magico}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_mysql_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
    ports:
      - "127.0.0.1:${MYSQL_PUBLIC_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ops/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
